{% extends "master.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'order.css' %}">
<style>
    .success-box {
        margin: 50px auto;
        font-family: 'Poppins', sans-serif;
        background: #ffffff;
        border-radius: 15px;
        padding: 40px 30px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        color: #333;


        .tick {
            font-size: 60px;
            color: #00e676;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        p {
            font-size: 15px;
            margin-bottom: 12px;
            background: #f2f2f2;
            padding: 10px;
            border-radius: 8px;
        }

        .btn {
            background: #00c853;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        .btn:hover {
            background: #009624;
        }
    }
</style>
<div class="container">

    <div class="success-box">
        <div class="tick">✅</div>
        <h2>Order Successful!</h2>
        <a href="{% url 'Order:trackOrder' %}?trackPathId={{order.trackPath.orderPathId}}" class="btn">
            Track Your Order</a>
    </div>
</div>

{% endblock %}
