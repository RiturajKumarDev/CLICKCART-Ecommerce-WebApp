{% extends "master.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'searchProduct.css' %}">


<!-- <div class="header">
  <h3>Results for "Asus TUF Gaming A15"</h3>
</div> -->
<div class="container">
  <div class="filter">
    <h3>Filter Options</h3>

    <!-- Brand Filter -->
    <div class="filter-group">
      <label>Brand:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="brand" value="Asus" /> Asus</label>
        <label><input type="checkbox" name="brand" value="HP" /> HP</label>
        <label><input type="checkbox" name="brand" value="Lenovo" /> Lenovo</label>
        <label><input type="checkbox" name="brand" value="MSI" /> MSI</label>
        <label><input type="checkbox" name="brand" value="Acer" /> Acer</label>
        <label><input type="checkbox" name="brand" value="Dell" /> Dell</label>
      </div>
    </div>

    <!-- Price Filter -->
    <div class="filter-group">
      <label>Price Range:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="price" value="0-60000" /> Under ₹60,000</label>
        <label><input type="checkbox" name="price" value="60000-80000" /> ₹60,000 - ₹80,000</label>
        <label><input type="checkbox" name="price" value="80000-100000" /> ₹80,000 - ₹1,00,000</label>
        <label><input type="checkbox" name="price" value="100000+" /> Above ₹1,00,000</label>
      </div>
    </div>

    <!-- Processor Filter -->
    <div class="filter-group">
      <label>Processor:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="processor" value="Intel" /> Intel</label>
        <label><input type="checkbox" name="processor" value="Amd-Ryzen" /> Amd-Ryzen</label>

      </div>
    </div>

    <!-- Rating Filter -->
    <div class="filter-group">
      <label>Minimum Rating:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="rating" value="4.5" /> 4.5+</label>
        <label><input type="checkbox" name="rating" value="4" /> 4+</label>
        <label><input type="checkbox" name="rating" value="3.5" /> 3.5+</label>
      </div>
    </div>

    <!-- Sort By Filter -->
    <div class="filter-group">
      <label>Sort By:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="sort" value="price-asc" /> Price: Low to High</label>
        <label><input type="checkbox" name="sort" value="price-desc" /> Price: High to Low</label>
        <label><input type="checkbox" name="sort" value="rating-desc" /> Rating: High to Low</label>
      </div>
    </div>
    <button onclick="applyFilters()">Apply Filters</button>
  </div>


  <div class="results">
    <h2>Results <button onclick="resultMenu();" class="result-menu">☰</button></h2>

    {% for product in products %}
    <a href="{% url 'Products:productPage' %}?productId={{product.productId }}">
      <div class="each-content" data-brand="{{product.productBrand}}" data-price="{{product.productPrice}}"
        data-rating="4.3" data-processor="Amd-Ryzen">
        <div class="images">
          <div class="image">
            <img loading="lazy" src="{{ product.images.img1 }}" alt="Image 1">
          </div>
        </div>
        <div class="result">
          <div class="product-name">{{product.productName}} | {{product.productBrand}}</div>
          <div class="product-description"> {{product.productTitle}}
          </div>
          <div class="product-rating">Rating: ★★★★☆ (4.3)</div>
          <div class="product-price">₹{{product.productPrice}}</div>
          <button class="buy-btn">Buy Now</button>
        </div>
      </div>
    </a>
    {% endfor %}


  </div>
</div>


<script>
  let menuBtn = document.querySelector(".menu-btn");
  menuBtn.addEventListener("click", () => {
    let menuSideBar = document.querySelector(".side-menu-bar");
    console.log("click");
    if (menuBtn.innerText == 'X')
      menuBtn.innerText = '☰';
    else
      menuBtn.innerText = 'X';
    menuSideBar.classList.toggle("show");
  });


  function resultMenu() {
    let filter = document.querySelector(".filter");
    filter.classList.toggle("show-results");
  }

  function applyFilters() {
    // Get selected brands, price ranges, ratings, processors, and sort options
    const selectedBrands = Array.from(document.querySelectorAll('.filter input[name="brand"]:checked')).map(checkbox => checkbox.value);
    const selectedPriceRanges = Array.from(document.querySelectorAll('.filter input[name="price"]:checked')).map(checkbox => checkbox.value);
    const selectedProcessor = Array.from(document.querySelectorAll('.filter input[name="processor"]:checked')).map(checkbox => checkbox.value);
    const selectedRatings = Array.from(document.querySelectorAll('.filter input[name="rating"]:checked')).map(checkbox => parseFloat(checkbox.value));
    const selectedSortOption = Array.from(document.querySelectorAll('.filter input[name="sort"]:checked')).map(checkbox => checkbox.value);

    let products = Array.from(document.querySelectorAll('.each-content'));

    // Apply filters to the products
    products.forEach(p => {
      const productBrand = p.dataset.brand;
      const productPrice = parseInt(p.dataset.price);
      const productRating = parseFloat(p.dataset.rating);
      const productProcessor = p.dataset.processor;

      // Price Range filtering
      let pricePass = false;
      if (selectedPriceRanges.length > 0) {
        selectedPriceRanges.forEach(range => {
          if (range.includes('-')) {
            const [minPrice, maxPrice] = range.split('-').map(Number);
            if (productPrice >= minPrice && productPrice <= maxPrice) {
              pricePass = true;
            }
          } else {
            const minPrice = parseInt(range);
            if (productPrice >= minPrice) {
              pricePass = true;
            }
          }
        });
      } else {
        pricePass = true;
      }

      // Brand filtering
      const brandPass = selectedBrands.length === 0 || selectedBrands.includes(productBrand);

      // Processor filtering
      const processorPass = selectedProcessor.length === 0 || selectedProcessor.includes(productProcessor);

      // Rating filtering
      const ratingPass = selectedRatings.length === 0 || selectedRatings.some(rating => productRating >= rating);

      // Apply the filters
      if (pricePass && brandPass && processorPass && ratingPass) {
        p.style.display = "flex";
      } else {
        p.style.display = "none";
      }
    });

    // Sorting functionality
    if (selectedSortOption.length > 0) {
      products.sort((a, b) => {
        const priceA = parseInt(a.dataset.price);
        const priceB = parseInt(b.dataset.price);
        const ratingA = parseFloat(a.dataset.rating);
        const ratingB = parseFloat(b.dataset.rating);

        switch (selectedSortOption[0]) {
          case 'price-asc': return priceA - priceB;
          case 'price-desc': return priceB - priceA;
          case 'rating-desc': return ratingB - ratingA;
          default: return 0;
        }
      });

      const container = document.querySelector('.results');
      products.forEach(p => container.appendChild(p));  // Reorder the products in the container
    }
    let filter = document.querySelector(".filter");
    filter.classList.toggle("show-results");
  }  
</script>
{% endblock %}
